services:
  db:
    image: postgres:16-alpine
    container_name: fortune_cookie_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: fortune_cookie
      POSTGRES_USER: fortune_user
      POSTGRES_PASSWORD: fortune_password
      TZ: Europe/Moscow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fortune_user -d fortune_cookie"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
